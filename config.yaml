# config.yaml

# 1. Configuration de la persistance (pour garder l'historique après reboot)
storage:
  type: sqlite
  path: /data/gatus.db
  maximum-number-of-results: 20000
  maximum-number-of-events: 1000

 
# 2. Paramètres de l'interface web
ui:
  title: "MESS - État des services"
  header: "Ministère de l'Emploi et de la Solidarité Sociale"
  dashboard-heading: État des services
  dashboard-subheading: Surveillance en temps réel de la qualité des services web
  #favicon: "data:image/png;base64,"
  logo: https://avatars.githubusercontent.com/u/51428766

# 3. Liste des services à surveiller
endpoints:

  - name: "Formulaires Web"
    group: "FRW-PROD"
    url: "https://formulaires.mtess.gouv.qc.ca/fr/DebuterFormulaire/1/3003" # Exemple si tu vises un service sur la même machine
    interval: 2m
    client:
      timeout: 60s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 336h"
      - "[BODY] == pat(*debuterFormulaire*)"
    alerts:
      - type: ntfy
        enabled: false
        
  - name: "Formulaires Web"
    group: "FRW-IT"
    url: "https://formulaires.it.mtess.gouv.qc.ca/fr/DebuterFormulaire/1/3003" # Exemple si tu vises un service sur la même machine
    interval: 2m
    client:
      timeout: 60s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 336h"
      - "[BODY] == pat(*debuterFormulaire*)"
    alerts:
      - type: ntfy
        enabled: false

  - name: "Formulaires Web - A"
    group: "FRW-A"
    url: "https://formulaires.mtess.gouv.qc.ca/fr/DebuterFormulaire/1/3003" # Exemple si tu vises un service sur la même machine
    interval: 2m
    client:
      timeout: 60s
    headers:
      X-NLB2: 172.16.0.170
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 700" # Alerte si le site est lent (> 700ms)
      - "[BODY] == pat(*debuterFormulaire*)"
    alerts:
      - type: ntfy
        enabled: true
        
  - name: "Formulaires Web - B"
    group: "FRW-B"
    url: "https://formulaires.mtess.gouv.qc.ca/fr/DebuterFormulaire/1/3003" # Exemple si tu vises un service sur la même machine
    interval: 2m
    client:
      timeout: 60s
    headers:
      X-NLB2: 172.16.0.180
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 700" # Alerte si le site est lent (> 700ms)
      - "[BODY] == pat(*debuterFormulaire*)"
    alerts:
      - type: ntfy
        enabled: true


  - name: "Mon dossier — Aide à l'emploi - Assistance sociale"
    group: "ECS-PROD"
    url: "https://mondossier.mtess.gouv.qc.ca/Anonyme/ConfirmationCourriel?codeConfirmation=POZGR4R3LHS3O41DP1ZJ6TRF0J2QKL" # Exemple si tu vises un service sur la même machine
    interval: 2m
    client:
      timeout: 60s
    conditions:
      - "[STATUS] == 200"
      - "[CERTIFICATE_EXPIRATION] > 336h"
      - "[BODY] == pat(*Échec de confirmation*)"
    alerts:
      - type: ntfy
        enabled: false
        failure-threshold: 3
        success-threshold: 2

  - name: "Mon dossier — Aide à l'emploi - Assistance sociale - A"
    group: "ECS-A"
    url: "https://mondossier.mtess.gouv.qc.ca/Anonyme/ConfirmationCourriel?codeConfirmation=POZGR4R3LHS3O41DP1ZJ6TRF0J2QKL" # Exemple si tu vises un service sur la même machine
    interval: 2m
    client:
      timeout: 60s
    headers:
      X-NLB2: 172.16.0.170
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 700" # Alerte si le site est lent (> 700ms)
      - "[BODY] == pat(*Échec de confirmation*)"
    alerts:
      - type: ntfy
        enabled: true
        failure-threshold: 3
        success-threshold: 2
        
  - name: "Mon dossier — Aide à l'emploi - Assistance sociale - B"
    group: "ECS-B"
    url: "https://mondossier.mtess.gouv.qc.ca/Anonyme/ConfirmationCourriel?codeConfirmation=POZGR4R3LHS3O41DP1ZJ6TRF0J2QKL" # Exemple si tu vises un service sur la même machine
    interval: 2m
    client:
      timeout: 60s
    headers:
      X-NLB2: 172.16.0.180
    conditions:
      - "[STATUS] == 200"
      - "[RESPONSE_TIME] < 700" # Alerte si le site est lent (> 700ms)
      - "[BODY] == pat(*Échec de confirmation*)"
    alerts:
      - type: ntfy
        enabled: true
        failure-threshold: 3
        success-threshold: 2
        
  - name: "SAG"
    group: "SAG-PROD"
    url: "https://mondossier.mtess.gouv.qc.ca/api/log/rss/Error/5NrMP79TPQ9CRt3Eywbi0dRq5YB9xc0mKBz5RO8D"
    interval: 2m
    client:
      timeout: 60s
    conditions:
      - "[STATUS] == 200"
      - "[BODY] != pat(*Unable to load public key*)"
    alerts:
      - type: ntfy
        enabled: true
        failure-threshold: 1
        success-threshold: 2
        
alerting:
  ntfy:
    url: "https://ntfy.sh"
    topic: "FRW-9f20ca4b3c334463befa08f2336b3c91"
    priority: 5
    default-alert:
      enabled: true
      failure-threshold: 3 # Alerte après 3 échecs consécutifs
      success-threshold: 2 # Alerte quand ça revient (RESOLVED)
      send-on-resolved: true
    overrides:
      - group: "ECS-A"
        topic: "ECS-9f20ca4b3c334463befa08f2336b3c91"
        priority: 4
      - group: "ECS-B"
        topic: "ECS-9f20ca4b3c334463befa08f2336b3c91"
        priority: 4

